<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
    <title>Login | Page</title>
  </head>
  <body class="bg-[#F8FAFC] pt-14">
    <section class="min-h-[743px] max-w-md mx-auto shadow-sm bg-white">
      <div class="flex justify-center pt-32">
        <img src="assets/github-logo.png" alt="" />
      </div>
      <div class="text-center pt-5">
        <h4 class="font-bold text-[24px]">GitHub Issues Tracker</h4>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>

          <div class="card bg-base-100 w-full max-w-md mx-auto">
            <div class="card-body">
              <fieldset class="fieldset">
                <label class="label text-[#1F2937] font-semibold  ">Username</label>
                <input type="email" value="admin" class="input text-[#64748B] w-full rounded-md" placeholder="Enter Username" />
                <label class="label text-[#1F2937] font-semibold  ">Password</label>
                <input type="password" class="input text-[#64748B] w-full rounded-md" placeholder="Enter Password" />
                
                <button class="btn bg-[#4A00FF] text-white rounded-md mt-4">Sign In</button>
              </fieldset>
            </div>
            <div class="flex items-center gap-2 text-[#1F2937] mx-6 my-2"><span class="flex-1 bg-[#E4E4E7] h-px"></span>OR<span class="flex-1 bg-[#E4E4E7] h-px"></span></div>
            <div class="text-center mt-6">
                <p class="text-[#64748B]">Demo Credentials:</p>
                <p class="mt-2"><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
    <title>GitHub Issues Tracker</title>
  </head>
  <body>
    <header class="bg-white shadow-sm pb-5">
      <nav class="flex justify-between max-w-[1400px] mx-auto mt-5">
        <div class="flex items-center gap-2">
          <img src="assets/github-logo_mini.png" alt="" class="" />
          <h3 class="font-bold text-[24px]">GitHub Issues Tracker</h3>
        </div>
        <div class="join">
          <div>
            <label class="input rounded-sm">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input
                id="search-input"
                type="search"
                required
                placeholder="Search issues..."
                class="text-[#64748B] font-medium"
              />
            </label>
          </div>
          <button
            id="search-btn"
            class="btn btn-primary join-item ml-4 rounded-sm"
          >
            Search
          </button>
        </div>
      </nav>
    </header>

    

    <main class="bg-[#F8FAFC] pt-10">
      <section
        class="max-w-[1110px] mx-auto py-4 shadow-sm rounded-md bg-white"
      >
        <div class="p-4">
          <button
            id="all-btn"
            onclick="toggle('all-btn')"
            class="btn w-[120px] bg-[#4A00FF] text-white"
          >
            ALL
          </button>
          <button
            id="open-btn"
            onclick="toggle('open-btn')"
            class="btn w-[120px]"
          >
            Open
          </button>
          <button
            id="close-btn"
            onclick="toggle('close-btn')"
            class="btn w-[120px]"
          >
            Closed
          </button>
        </div>
      </section>
      <section
        class="max-w-[1110px] mx-auto my-4 p-6 shadow-sm rounded-md bg-white"
      >
        <div class="flex justify-between">
          <div class="flex gap-3">
            <div
              class="bg-[#ECE4FF] rounded-full w-[50px] h-[50px] flex justify-center items-center"
            >
              <img src="assets/Aperture.png" alt="" class="w-[32px] h-[32px]" />
            </div>
            <div>
              <p class="font-semibold text-[#1F2937] text-[20px]">
                <span id="total-issues">0</span> Issues
              </p>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-5">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 bg-green-500 rounded-full"></span>
              <span>Open</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 bg-purple-500 rounded-full"></span>
              <span>Closed</span>
            </div>
          </div>
        </div>
      </section>
    </main>

   
      <section id="loading-bar" class="flex justify-center items-center flex-col hidden">
        <span class="loading loading-bars loading-xl"></span>
        <h2 class="text-center font-semibold text-[20px]">Loading....</h2>
      </section>
    
    <section
      id="issues-container"
      class="max-w-[1110px] mx-auto py-10 shadow-sm rounded-md grid sm:grid-cols-1 lg:grid-cols-4 gap-3"
    ></section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="details-container">
          
        </div>

        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="px-4 py-2 bg-[#4A00FF] text-white border-none font-bold">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="JS/script.js"></script>
  </body>
</html>
